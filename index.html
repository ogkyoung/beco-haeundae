<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부산환경공단 안내</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --beco-green: #1b8a5a;
            --beco-blue: #1f78d1;
            --beco-orange: #f58220;
            --bg-light: #f7fbff;
            --text-dark: #234;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background: white;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header img {
            height: 35px;
            width: auto;
            cursor: pointer;
        }

        .container {
            max-width: 480px;
            margin: auto;
            padding: 40px 20px;
            min-height: 85vh;
        }

        .view {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a3a5f;
            line-height: 1.35;
            margin-bottom: 8px;
        }

        .main-subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .card {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-kids {
            background: linear-gradient(135deg, #dff3ff, var(--beco-blue));
            color: white;
        }

        .card-adults {
            background: linear-gradient(135deg, #36a86f, var(--beco-green));
            color: white;
        }

        .inner-btn {
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 15px;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-orange {
            background-color: var(--beco-orange);
            color: white;
        }

        .btn-blue {
            background-color: var(--beco-blue);
            color: white;
        }

        .card-text {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.5;
        }

        .footer-qna {
            margin-top: 40px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .footer-qna h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: #333;
            cursor: pointer;
            margin-bottom: 8px;
            margin-top: 0;
        }

        .footer-qna p {
            margin-bottom: 0;
        }

        .video-box {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            margin: 25px 0;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .video-box video {
            display: block;
            width: 100%;
            height: auto;
            background: #000;
        }

        .info-card {
            text-align: left;
            padding: 10px;
        }

        .info-card h3 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #111;
        }

        .info-card p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #444;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .submit-btn {
            background: var(--beco-green);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .back-btn {
            color: #888;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" onerror="this.src='https://www.beco.or.kr/images/kor/layout/logo.png'" alt="부산환경공단 로고" onclick="showView('home-view')">
</header>

<div class="container">
    <div id="home-view" class="view active">
        <h1 class="main-title">부산의 깨끗한 내일을 위한<br>부산환경공단 이야기</h1>
        

        <div class="card card-kids" onclick="loadVideo('kids')">
            <button class="inner-btn btn-orange">어린이용</button>
            <div class="card-text">쉽고 재미있게 보는 부산환경공단 이야기</div>
        </div>

        <div class="card card-adults" onclick="loadVideo('adults')">
            <button class="inner-btn btn-blue">어른용</button>
            <div class="card-text">부산환경공단의 역할과 시설을 자세히 소개합니다</div>
        </div>

        <div class="footer-qna" onclick="showView('qna-view')" style="cursor: pointer;">
            <h2>궁금해요</h2>
            <p class="main-subtitle" style="margin-bottom: 0;">궁금한 내용을 남겨주세요.</p>
        </div>
    </div>

    <div id="video-view" class="view">
        <a href="#" class="back-btn" onclick="showView('home-view'); return false;">이전으로 돌아가기</a>
        <div class="video-box" id="video-player-box">
            <video id="local-player" controls autoplay muted playsinline>
                <source id="video-source" src="" type="video/mp4">
                브라우저가 동영상을 지원하지 않습니다.
            </video>
        </div>
        <div class="info-card">
            <h3 id="v-title"></h3>
            <p id="v-desc"></p>
        </div>
    </div>

    <div id="qna-view" class="view">
        <a href="#" class="back-btn" onclick="showView('home-view'); return false;">이전으로 돌아가기</a>
        <h2 style="font-size: 1.6rem; font-weight: 800; text-align: left; margin-top: 0;">문의하기</h2>
        <textarea id="msg" class="input-field" rows="6" placeholder="문의하실 내용을 입력해주세요"></textarea>
        <input type="email" id="user-email" class="input-field" placeholder="답변받을 이메일 주소를 입력해주세요">
        <button class="submit-btn" onclick="sendMail()">메일 보내기</button>
    </div>
</div>

<script>
    const videoData = {
        kids: {
            src: '어린이용 동영상.mp4.mp4',
            title: '어린이용 부산환경공단 소개',
            desc: '어린이 눈높이에 맞춰 부산환경공단이 하는 일을 쉽고 재미있게 소개하는 영상입니다. 생활 속 환경보호와 자원순환의 의미를 자연스럽게 이해할 수 있도록 구성했습니다.'
        },
        adults: {
            src: '어른용 동영상.mp4.mp4',
            title: '어른용 부산환경공단 소개',
            desc: '부산환경공단의 주요 역할과 운영 방향을 간단하게 살펴볼 수 있는 영상입니다. 도시 환경을 지키기 위한 시설 운영과 자원순환의 흐름을 이해하기 쉽게 담았습니다.'
        }
    };

    function showView(viewId) {
        document.querySelectorAll('.view').forEach(function(view) {
            view.classList.remove('active');
        });
        document.getElementById(viewId).classList.add('active');

        if (viewId !== 'video-view') {
            const player = document.getElementById('local-player');
            player.pause();
            player.currentTime = 0;
        }

        window.scrollTo(0, 0);
    }

    function loadVideo(mode) {
        const data = videoData[mode];
        const player = document.getElementById('local-player');
        const source = document.getElementById('video-source');
        const title = document.getElementById('v-title');
        const desc = document.getElementById('v-desc');

        source.src = data.src;
        player.load();

        const playPromise = player.play();
        if (playPromise && typeof playPromise.catch === 'function') {
            playPromise.catch(function() {});
        }

        title.innerText = data.title;
        desc.innerText = data.desc;
        showView('video-view');
    }

    function sendMail() {
        const msg = document.getElementById('msg').value.trim();
        const email = document.getElementById('user-email').value.trim();

        if (!msg || !email) {
            alert('문의 내용과 답변받을 이메일을 모두 입력해주세요.');
            return;
        }

        const subject = encodeURIComponent('[문의] 부산환경공단 홍보웹앱 문의');
        const body = encodeURIComponent('답변받을 이메일: ' + email + '\n\n문의 내용:\n' + msg);
        window.location.href = 'mailto:ok514@beco.or.kr?subject=' + subject + '&body=' + body;
    }
</script>

</body>
</html>
