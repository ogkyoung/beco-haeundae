<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Environment Corporation Guide</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { 
            --beco-green: #1b5e20; --beco-blue: #4db8ff; --beco-orange: #ff5722;
            --bg-light: #f8fbff; --text-dark: #2c3e50;
        }
        body { 
            font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg-light); 
            color: var(--text-dark); text-align: center; -webkit-font-smoothing: antialiased;
        }
        
        /* 상단 헤더 및 로고 */
        header { 
            background: white; padding: 20px 0; text-align: center; 
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000;
        }
        header img { height: 35px; width: auto; cursor: pointer; }

        .container { max-width: 480px; margin: auto; padding: 40px 20px; min-height: 85vh; }
        .view { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 디자인 참조 시안 기반 타이틀 */
        .main-title { font-size: 1.8rem; font-weight: 800; color: #1a3a5f; line-height: 1.3; margin-bottom: 8px; }
        .main-subtitle { font-size: 1rem; color: #666; margin-bottom: 40px; }

        /* 카드 버튼 섹션 (디자인 시안 반영) */
        .card { 
            width: 100%; border-radius: 20px; margin-bottom: 20px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s;
            position: relative; display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
            box-sizing: border-box;
        }
        .card:active { transform: scale(0.98); }
        
        /* 어린이용 카드 (Blue) */
        .card-kids { background: linear-gradient(135deg, #aaddff, #88ccff); }
        /* 어른용 카드 (Green) */
        .card-adults { background: linear-gradient(135deg, #2e7d32, #1b5e20); color: white; }

        /* 카드 내부 버튼 스타일 */
        .inner-btn { 
            padding: 10px 30px; border-radius: 30px; font-weight: 800; font-size: 1.1rem; 
            margin-bottom: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-orange { background-color: #ff5722; color: white; }
        .btn-blue { background-color: #1e88e5; color: white; }

        .card-text { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; }

        /* 하단 궁금해요 섹션 */
        .footer-qna { margin-top: 40px; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .footer-qna h2 { font-size: 1.3rem; font-weight: 800; color: #333; cursor: pointer; margin-bottom: 8px; margin-top: 0; }
        .footer-qna p { margin-bottom: 0; }

        /* 영상 재생 영역 */
        .video-box { 
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0; 
            border-radius: 15px; overflow: hidden; background: #000; margin: 25px 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .info-card { text-align: left; padding: 10px; }
        .info-card h3 { font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; color: #111; }
        .info-card p { font-size: 1.05rem; line-height: 1.7; color: #444; }

        /* 문의 폼 */
        .input-field { 
            width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; 
            border-radius: 10px; font-size: 1rem; box-sizing: border-box; outline: none;
        }
        .submit-btn { background: #1b5e20; color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .back-btn { color: #888; text-decoration: none; display: inline-block; margin-bottom: 20px; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" onerror="this.src='https://www.beco.or.kr/images/kor/layout/logo.png'" alt="부산환경공단" onclick="showView('home-view')">
</header>

<div class="container">
    <!-- [메인 화면] 디자인 참조 시안 완벽 반영 -->
    <div id="home-view" class="view active">
        <h1 class="main-title">부산의 미래를<br>지키는 녹색 엔진 🍃</h1>
        <p class="main-subtitle">해운대 환경공원에서 공단의 마법을 확인하세요</p>
        
        <!-- 어린이용 카드 -->
        <div class="card card-kids" onclick="loadVideo('kids')">
            <button class="inner-btn btn-orange">어린이용</button>
            <div class="card-text">어린이 환경 수호대 [체험하러 가기]</div>
        </div>

        <!-- 어른용 카드 -->
        <div class="card card-adults" onclick="loadVideo('adults')">
            <button class="inner-btn btn-blue">[상세 정보 확인]</button>
            <div class="card-text">부산의 녹색 엔진 리포트</div>
        </div>

        <!-- 궁금해요 섹션 -->
        <div class="footer-qna" onclick="showView('qna-view')" style="cursor: pointer;">
            <h2>궁금해요</h2>
            <p class="main-subtitle" style="margin-bottom:0;">환경에 대한 시민 여러분의 소중한 의견을 기다립니다.</p>
        </div>
    </div>

    <!-- [영상 재생 화면] -->
    <div id="video-view" class="view">
        <a href="#" class="back-btn" onclick="showView('home-view')">← 다시 선택하기</a>
        <div class="video-box" id="yt-player"></div>
        <div class="info-card">
            <h3 id="v-title"></h3>
            <p id="v-desc"></p>
        </div>
    </div>

    <!-- [문의 작성 화면] -->
    <div id="qna-view" class="view">
        <a href="#" class="back-btn" onclick="showView('home-view')">← 뒤로가기</a>
        <h2 style="font-size: 1.6rem; font-weight: 800; text-align: left; margin-top:0;">💬 궁금해요</h2>
        <textarea id="msg" class="input-field" rows="6" placeholder="문의하실 내용을 입력해주세요"></textarea>
        <input type="email" id="user-email" class="input-field" placeholder="답변 받을 이메일 주소">
        <button class="submit-btn" onclick="sendMail()">작성 완료</button>
    </div>
</div>

<script>
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        document.getElementById('yt-player').innerHTML = ''; 
        window.scrollTo(0,0);
    }

    function loadVideo(mode) {
        const player = document.getElementById('yt-player');
        const title = document.getElementById('v-title');
        const desc = document.getElementById('v-desc');
        let vid = "";

        if(mode === 'kids') {
            vid = "xh-G0kPmIHk"; 
            title.innerText = "어린이 환경 수호대 미션";
            desc.innerHTML = "우리가 매일 버리는 <b>1.2kg의 쓰레기</b>가 뜨거운 에너지가 되어 우리 집을 데워줍니다. 14개 센터에서 매일 <b>200만 톤의 하수</b>를 정화하는 비밀을 확인하세요.";
        } else {
            vid = "_DiSfU3Saxc"; 
            title.innerText = "부산의 녹색 엔진 리포트";
            desc.innerHTML = "<b>일일 200만 톤의 하수 처리</b>와 <b>하루 4,000톤의 폐기물 자원화</b>를 실현합니다. 저탄소 그린 도시 부산을 움직이는 스마트 기술력의 핵심을 소개합니다.";
        }

        // 브라우저 권한 보안 규정을 준수하여 유튜브가 자동 재생되도록 mute 속성을 추가 삽입
        player.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1&mute=1&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        showView('video-view');
    }

    function sendMail() {
        const msg = document.getElementById('msg').value;
        const email = document.getElementById('user-email').value;
        if(!msg || !email) return alert("내용을 입력해주세요.");
        window.location.href = `mailto:ok514@beco.or.kr?subject=[문의] 시민 궁금증&body=회신처: ${email}\n\n내용: ${msg}`;
        showView('home-view');
    }
</script>

</body>
</html>
